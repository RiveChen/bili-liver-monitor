# ============================================
# bili-liver-monitor 配置
# ============================================

monitor:
  bilibili:
    # 要监控的主播 UID 列表（注意：不是直播间 ID）
    uid_list:
    - 434334701 # 七海 
    - 401315430 # 星瞳
    - 2132180406 # 奶绿
    notify_live_end: true # 是否推送下播通知
    poll_interval: 30 # 轮询间隔（秒）

    # Bilibili 动态监控设置
    notify_dynamic: true # 是否推送动态通知
    dynamic_poll_interval: 60 # 动态轮询间隔（秒）
    skip_forward: false # 是否跳过转发动态
    cookie: "" # 如果启用动态监控，必须填入带 SESSDATA 的登录 cookie

pusher:
  napcat:
    # NapCatQQ HTTP API 地址
    api_url: "http://127.0.0.1:3000"
    # API Token（如果 NapCatQQ 配置了 access-token）
    token: ""
    # 私聊推送目标 QQ 号
    user_id: 0 # ← 替换为实际 QQ 号
    # 群聊推送目标群号（可多个）
    group_ids: [] # ← 替换为实际群号
    # 是否 @全体成员 ("all" 或 "")
    at_qq: ""

listener:
  # NapCatQQ 事件监听配置（Forward WebSocket）
  # Bot 自身的 QQ 号（用于检测群聊 @）
  bot_qq: 0 # ← 替换为实际 Bot QQ 号
  # WebSocket 连接地址
  ws_url: "ws://127.0.0.1:3001"
  # 群聊白名单：只在这些群响应命令（不配置则不限制）
  allowed_groups: []

# 日志级别: DEBUG / INFO / WARNING / ERROR
log_level: INFO
